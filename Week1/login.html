<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCare Clinic — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --red: #ef4444;
      --white: #ffffff;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      overflow: hidden;
      position: relative;
    }

    /* ── ANIMATED BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #3b82f6, #1d4ed8);
      top: -120px; left: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #06b6d4, #0891b2);
      bottom: -100px; right: -80px;
      animation-delay: -3s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #6366f1, #4f46e5);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -5s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.97); }
    }

    /* ── GRID OVERLAY ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    /* ── LOGO ── */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 24px rgba(37, 99, 235, 0.5);
    }
    .logo-icon svg { width: 22px; height: 22px; }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text span {
      background: linear-gradient(90deg, #60a5fa, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── CARD ── */
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 36px 32px 32px;
      box-shadow:
        0 25px 50px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .card-sub {
      font-size: 13.5px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      color: rgba(255,255,255,0.45);
      font-size: 13.5px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s;
    }
    .tab.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.25); }
    .form-group input:focus {
      background: rgba(255,255,255,0.1);
      border-color: rgba(96, 165, 250, 0.6);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    /* ── ERROR ── */
    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
      font-weight: 500;
    }
    .error-msg.show { display: block; }

    /* ── SUCCESS ── */
    .success-msg {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
      font-weight: 500;
    }
    .success-msg.show { display: block; }

    /* ── BUTTON ── */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.4);
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::before { opacity: 1; }
    .btn:hover { box-shadow: 0 6px 24px rgba(37, 99, 235, 0.55); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.6; cursor: not-allowed;
      transform: none; box-shadow: none;
    }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.25);
    }

    /* ── DECORATIVE DOTS ── */
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
    }
    .dot.active { background: #2563eb; }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <!-- Main -->
  <div class="wrapper">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 4v16M4 12h16"/>
        </svg>
      </div>
      <div class="logo-text">Medi<span>Care</span></div>
    </div>

    <div class="card">
      <h1 class="card-title" id="card-title">Welcome back</h1>
      <p class="card-sub" id="card-sub">Sign in to access the clinic dashboard</p>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- Feedback -->
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <!-- Email -->
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="email" placeholder="admin@medicare.clinic" autocomplete="email" />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
      </div>

      <button class="btn" id="submit-btn" onclick="handleSubmit()">Sign In</button>

      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <p class="footer">MediCare Clinic &mdash; Patient Management System</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://dwsfwzleiybjunoqcudh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3c2Z3emxlaXlianVub3FjdWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODA4MzYsImV4cCI6MjA5NDk1NjgzNn0.937zxZij7-vQYK4GyoKn1VOfRxPSo-VAh1-aOyOjHF0';
    const { createClient } = supabase;
    const auth = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let mode = 'login';

    // Redirect if already logged in
    auth.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    function switchTab(tab) {
      mode = tab;
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('submit-btn').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
      document.getElementById('card-title').textContent = tab === 'login' ? 'Welcome back' : 'Create account';
      document.getElementById('card-sub').textContent = tab === 'login'
        ? 'Sign in to access the clinic dashboard'
        : 'Register to get started with MediCare';
      clearFeedback();
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-msg').classList.add('show');
      document.getElementById('success-msg').classList.remove('show');
    }
    function showSuccess(msg) {
      document.getElementById('success-msg').textContent = msg;
      document.getElementById('success-msg').classList.add('show');
      document.getElementById('error-msg').classList.remove('show');
    }
    function clearFeedback() {
      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('success-msg').classList.remove('show');
    }

    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      btn.disabled = on;
      if (on) {
        btn.innerHTML = '<span class="spinner"></span>Please wait...';
      } else {
        btn.textContent = mode === 'login' ? 'Sign In' : 'Create Account';
      }
    }

    async function handleSubmit() {
      clearFeedback();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { showError('Please enter your email and password.'); return; }
      if (mode === 'signup' && password.length < 6) { showError('Password must be at least 6 characters.'); return; }

      setLoading(true);

      if (mode === 'login') {
        const { error } = await auth.auth.signInWithPassword({ email, password });
        if (error) {
          showError(error.message === 'Invalid login credentials'
            ? 'Incorrect email or password. Please try again.'
            : error.message);
          setLoading(false);
        } else {
          window.location.href = 'index.html';
        }
      } else {
        const { error } = await auth.auth.signUp({ email, password });
        if (error) {
          showError(error.message);
          setLoading(false);
        } else {
          showSuccess('Account created! Check your email for a confirmation link.');
          setLoading(false);
        }
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
